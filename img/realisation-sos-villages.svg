<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f0a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g stroke="rgba(0,200,83,0.06)" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
  </g>
  <!-- Heart icon -->
  <g transform="translate(300,155)">
    <path d="M0,18 C-5,12 -30,-5 -30,-18 C-30,-30 -18,-38 0,-20 C18,-38 30,-30 30,-18 C30,-5 5,12 0,18 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
  </g>
  <!-- 4 dots for 4 cities -->
  <g fill="rgba(0,200,83,0.6)">
    <circle cx="240" cy="190" r="5"/><circle cx="270" cy="195" r="5"/>
    <circle cx="330" cy="195" r="5"/><circle cx="360" cy="190" r="5"/>
  </g>
  <text x="300" y="240" text-anchor="middle" font-family="'Orbitron',Arial,sans-serif" font-size="14" font-weight="700" fill="url(#accent)">VILLAGES DES ENFANTS SOS</text>
  <text x="300" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(136,136,160,0.8)">Déc. 2025 · Jendouba · Kasserine · Siliana · Kairouan</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(0,212,255,0.5)">UNIVERS VR</text>
</svg>
