<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3d"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B2FBE"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g stroke="rgba(0,212,255,0.06)" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
  </g>
  <!-- Medical cross -->
  <g transform="translate(300,160)" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
    <rect x="-50" y="-22" width="100" height="45" rx="10"/>
    <line x1="0" y1="-14" x2="0" y2="15"/>
    <line x1="-14" y1="0" x2="14" y2="0"/>
    <circle cx="-55" cy="0" r="5" fill="rgba(0,212,255,0.4)" stroke="none"/>
    <circle cx="55" cy="0" r="5" fill="rgba(123,47,190,0.4)" stroke="none"/>
  </g>
  <text x="300" y="240" text-anchor="middle" font-family="'Orbitron',Arial,sans-serif" font-size="15" font-weight="700" fill="url(#accent)">SALON DES PATIENTS 2026</text>
  <text x="300" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(136,136,160,0.8)">4 Avril 2026 · Cité de la Culture, Tunis</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(0,212,255,0.5)">UNIVERS VR</text>
</svg>
